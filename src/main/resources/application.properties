# ============================================================
# REFERRAL & INVITE — public landing URL
# ------------------------------------------------------------
# Used by ReferralService to build invite links: <url>/r/<code>.
# Override per-environment (prod uses https://app.vibeu.com).
# Web client should host a /r/:code route that:
#   1. POSTs to /referrals/clicks with the code (anonymous tracking),
#   2. tries to deep-link into the native app,
#   3. falls back to "install + paste this code" UI.
# ============================================================
app.public-web-url=${PUBLIC_WEB_URL:http://localhost:5173}

# Production: use HTTPS (TLS) for the API and web app so data is encrypted in transit.
# Host the Spring app behind a reverse proxy (nginx, Caddy) with a valid TLS certificate.

# ============================================================
# FIREBASE AUTH (Google sign-in + Phone OTP)
# ------------------------------------------------------------
# Put your Firebase service-account JSON here.
# Download from: Firebase Console -> Project settings ->
#   Service accounts -> Generate new private key.
#
# Two options:
#   1. Place the file at the path below (recommended for dev).
#   2. Set the GOOGLE_APPLICATION_CREDENTIALS env var instead,
#      and leave this property empty.
# ============================================================
firebase.credentials-path=src/main/resources/firebase-service-account.json
firebase.enabled=true

# ============================================================
# SECURITY ARCHITECTURE
# ------------------------------------------------------------
# All secrets below should be overridden in production via
# environment variables or application-local.properties.
# Never commit production keys to git.
# ============================================================

# AES-256 server-side encryption key (32 raw bytes, base64 encoded).
# Generate with:  openssl rand -base64 32
app.security.encryption-key-base64=ZGVmYXVsdC1pbnNlY3VyZS1rZXktcGxlYXNlLXJvdGF0ZS0zMmI=

# JWT signing keys (HS512 — 64 raw bytes each, base64 encoded).
# Generate each with:  openssl rand -base64 64
app.security.jwt.access-secret-base64=ZGVmYXVsdC1hY2Nlc3Mtc2VjcmV0LXBsZWFzZS1yb3RhdGUtNjQtYnl0ZXMtbG9uZy1lbm91Z2gtZm9yLWhzNTEyLXNlY3VyaXR5LWFsZ29yaXRobS5fXw==
app.security.jwt.refresh-secret-base64=ZGVmYXVsdC1yZWZyZXNoLXNlY3JldC1wbGVhc2Utcm90YXRlLTY0LWJ5dGVzLWxvbmctZW5vdWdoLWZvci1oczUxMi1zZWN1cml0eS1hbGdvcml0aG0uX18=

# Token TTLs (seconds)
app.security.jwt.access-ttl-seconds=900
app.security.jwt.refresh-ttl-seconds=2592000

# Room-join token TTL (short-lived; rotated per join)
app.security.room-token-ttl-seconds=120

# Brute-force protection
app.security.brute-force.max-attempts=5
app.security.brute-force.lockout-minutes=15

# Rate limiting (requests per minute per IP, per route group)
app.security.rate-limit.auth-rpm=12
app.security.rate-limit.api-rpm=240
app.security.rate-limit.upload-rpm=30

# CORS — comma separated origins; * allowed in dev, restrict in prod
app.security.cors.allowed-origins=*

# Audit log retention (days; older rows purged by scheduled job)
app.security.audit.retention-days=180

# Admin hardening
# Comma-separated CIDR-less list of IP addresses allowed to call /admin/**
# Leave blank to disable the IP allowlist in dev.
app.security.admin.ip-allowlist=
# How long an admin's elevated session lasts before they must re-authenticate.
app.security.admin.session-ttl-minutes=120

# Media token TTL (seconds) used by /media/signed-url
app.security.media.token-ttl-seconds=300

# Replay protection — max age the server will accept for a signed request
app.security.signature.max-age-seconds=300

# ============================================================
# PERFORMANCE / CACHE
# ============================================================
# Caffeine handles the L1 in-process cache. Switch to "redis" in prod to use
# the Redis instance configured below — the @Cacheable annotations are the
# same shape regardless of provider.
spring.cache.type=caffeine

# Hibernate + connection pool tuning for the social workload.
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.max-lifetime=1800000
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true

# Compress responses larger than 1 KB to shrink mobile payloads.
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# Tomcat thread pool — bigger queue is cheap and helps burst traffic.
server.tomcat.threads.max=400
server.tomcat.accept-count=200
server.tomcat.max-connections=10000

# ============================================================
# AI MODERATION
# ============================================================
# Comma-separated blocklist consumed by ContentModerationService. Keep simple
# in dev; production replaces this with a remote ML moderation provider.
app.moderation.blocklist=fuck,shit,bitch,whore,slut,cunt,nigger,faggot,kill yourself

# ============================================================
# ACTUATOR — health, metrics, prometheus-ready
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized

# ============================================================
# OBSERVABILITY
# ============================================================
logging.level.root=INFO
logging.level.com.example.demo=INFO
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

