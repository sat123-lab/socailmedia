# =============================================================================
#  PRODUCTION PROFILE — activate with:  --spring.profiles.active=production
#
#  Every secret value MUST come from an env var; never commit production
#  secrets. The defaults below are placeholders so the file still parses.
# =============================================================================

# -----------------------------------------------------------------------------
#  Datasource — point this at your managed MySQL (RDS, Cloud SQL, Aurora…)
# -----------------------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/social_media_db?useSSL=true&serverTimezone=UTC&characterEncoding=utf8&useUnicode=true}
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASS:}
spring.datasource.hikari.maximum-pool-size=${DB_POOL:50}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# -----------------------------------------------------------------------------
#  Cache — switch to Redis in prod
# -----------------------------------------------------------------------------
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASS:}
spring.data.redis.timeout=2000

# -----------------------------------------------------------------------------
#  Security — secrets from env
# -----------------------------------------------------------------------------
app.security.encryption-key-base64=${APP_AES_KEY:}
app.security.jwt.access-secret-base64=${JWT_ACCESS_KEY:}
app.security.jwt.refresh-secret-base64=${JWT_REFRESH_KEY:}
app.security.cors.allowed-origins=${CORS_ORIGINS:https://app.vibeu.com,https://admin.vibeu.com}
app.security.admin.ip-allowlist=${ADMIN_IP_ALLOWLIST:}

# -----------------------------------------------------------------------------
#  Firebase — service account path mounted from a secret volume
# -----------------------------------------------------------------------------
firebase.credentials-path=${FIREBASE_KEY_PATH:/etc/firebase/service-account.json}

# -----------------------------------------------------------------------------
#  TLS — terminated by the reverse proxy; force HTTPS at the edge.
#  X-Forwarded-* headers must be honoured (set behind nginx/Caddy/Cloudflare).
# -----------------------------------------------------------------------------
server.forward-headers-strategy=framework

# -----------------------------------------------------------------------------
#  Observability
# -----------------------------------------------------------------------------
logging.level.root=WARN
logging.level.com.example.demo=INFO
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never

# -----------------------------------------------------------------------------
#  File uploads — production points at S3 / R2 / GCS via a small adapter.
#  Until that swap, keep the local dir tiny so we never spill onto the host.
# -----------------------------------------------------------------------------
file.upload-dir=${UPLOAD_DIR:/var/social/uploads}
spring.servlet.multipart.max-file-size=${MAX_UPLOAD:200MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD:200MB}
